<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RsrtcLifeline | बस खोजें</title>
    <link rel="stylesheet" href="https://ghostfromin.github.io/rsrtc_l9ine/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-[#f0f4f9]">

    <div id="app-header"></div>

    <main class="p-4 space-y-6 app-panel active" id="mainPanel">
        <div class="bg-gradient-to-br from-blue-600 to-blue-800 text-white p-6 rounded-3xl shadow-lg">
            <h2 class="text-xl font-bold mb-1">आज कहा जाना है?</h2>
            <p class="text-blue-100 text-sm">आसानी से राजस्थान की बसें खोजें</p>
        </div>

        <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm relative">
            <div class="space-y-3">
                <div class="relative">
                    <i data-lucide="map-pin" class="absolute left-3 top-3.5 text-blue-500 w-5 h-5"></i>
                    <input id="fromInput" placeholder="कहाँ से?" autocomplete="off"
                        class="w-full pl-11 p-3.5 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <div id="fromDropdown"
                        class="absolute w-full mt-1 bg-white border rounded-xl shadow-lg z-50 hidden max-h-60 overflow-y-auto">
                    </div>
                </div>

                <div class="relative">
                    <i data-lucide="map-pinned" class="absolute left-3 top-3.5 text-blue-500 w-5 h-5"></i>
                    <input id="toInput" placeholder="कहाँ जाना है?" autocomplete="off"
                        class="w-full pl-11 p-3.5 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <div id="toDropdown"
                        class="absolute w-full mt-1 bg-white border rounded-xl shadow-lg z-50 hidden max-h-60 overflow-y-auto">
                    </div>
                </div>
            </div>

            <button id="swapBtn"
                class="absolute right-6 top-[50px] w-12 h-12 bg-white border border-slate-200 shadow-md rounded-full flex items-center justify-center hover:bg-slate-50 transition-transform active:rotate-180 z-20">
                <i data-lucide="arrow-down-up" class="text-blue-600"></i>
            </button>
            <button id="findBtn"
                class="w-full mt-5 bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2">
                <i data-lucide="search"></i> बस खोजें
            </button>

            <div
                class="mt-6 mx-4 px-2 py-4 flex justify-center items-center bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="w-[300px] h-[250px] flex items-center justify-center">
                    <script type="text/javascript">
                        atOptions = {
                            'key': '933c4e4c8f32454f684814bcde5d8cd0',
                            'format': 'iframe',
                            'height': 250,
                            'width': 300,
                            'params': {}
                        };
                    </script>
                    <script type="text/javascript"
                        src="https://www.highperformanceformat.com/933c4e4c8f32454f684814bcde5d8cd0/invoke.js"></script>
                </div>
            </div>
        </div>
    </main>

    <div id="resultsSection" class="hidden app-panel space-y-4 pb-10">
        <div class="flex items-center justify-between px-2">
            <h3 class="font-bold text-slate-800">उपलब्ध बसें</h3>

            <div class="flex items-center gap-2">
                <button id="shareResultsBtn" class="p-2 rounded-full hover:bg-slate-100 transition">
                    <i data-lucide="share-2" class="w-5 h-5"></i>
                </button>

                <button id="closeResults" class="text-sm text-blue-600 font-semibold">
                    वापस जाएँ
                </button>
            </div>
        </div>

        <!-- YAHAN NAYA AD DALO -->
        <div class="my-3 flex justify-center overflow-hidden rounded-2xl">
            <script type="text/javascript">
                atOptions = {
                    'key': '933c4e4c8f32454f684814bcde5d8cd0', // Agar naya ad zone hai toh uski key badalna
                    'format': 'iframe',
                    'height': 250,
                    'width': 300,
                    'params': {}
                };
            </script>
            <script type="text/javascript"
                src="https://www.highperformanceformat.com/933c4e4c8f32454f684814bcde5d8cd0/invoke.js"></script>
        </div>

        <div id="busList" class="space-y-4"></div>

        <div id="loadMoreLoader"
            class="hidden flex flex-col items-center justify-center p-5 gap-2 text-slate-500 text-sm">
            <div class="w-8 h-8 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
            <span>Loading more buses...</span>
        </div>
    </div>


    <div id="detailsPage" class="app-panel hidden w-full bg-white z-[9999]">
        <div class="sticky top-0 bg-white border-b border-slate-100 p-4 flex items-center gap-4 z-10">
            <button onclick="closeDetailsPage()" class="p-2 rounded-full hover:bg-slate-100">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>

            <h2 class="font-bold text-lg flex-1">Bus Details</h2>

            <button class="share-nav-btn p-2 rounded-full hover:bg-slate-100">
                <i data-lucide="share-2" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="p-4 space-y-6">
            <div class="bg-slate-50 p-4 rounded-3xl">
                <h1 id="detVendor" class="text-2xl font-black text-slate-900 mb-1">---</h1>
                <p id="detRoute" class="text-slate-600 font-medium mb-5">---</p>

                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-white p-3 rounded-2xl text-center shadow-sm border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Duration</p>
                        <p id="detDuration" class="font-bold text-slate-800 text-sm">---</p>
                    </div>
                    <div class="bg-white p-3 rounded-2xl text-center shadow-sm border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Depot</p>
                        <p id="detDepot" class="font-bold text-slate-800 text-sm">---</p>
                    </div>
                    <div class="bg-white p-3 rounded-2xl text-center shadow-sm border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Type</p>
                        <p id="detType" class="font-bold text-slate-800 text-sm">---</p>
                    </div>
                </div>
            </div>

            <div class="w-full overflow-x-auto pb-4">
                <table class="w-full text-sm min-w-[400px]">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase font-bold tracking-wider">
                            <th class="p-3 text-left w-10"></th>
                            <th class="p-3 text-left">Route</th>
                            <th class="p-3 text-left">Arr</th>
                            <th class="p-3 text-left">Dep</th>
                            <th class="p-3 text-right">Dist</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                    </tbody>
                </table>
            </div>

            <script>
                atOptions = {
                    'key': 'fedde6d1dc553304db57bf48e69b5ec4',
                    'format': 'iframe',
                    'height': 50,
                    'width': 320,
                    'params': {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/fedde6d1dc553304db57bf48e69b5ec4/invoke.js"></script>

        </div>
    </div>

    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-white/80 backdrop-blur-sm">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-blue-600 font-semibold animate-pulse">Loading...</p>
        </div>
    </div>
    <script src="https://ghostfromin.github.io/rsrtc_l9ine/headerMaker.js"></script>
    <script src="https://ghostfromin.github.io/rsrtc_l9ine/script.core.js"></script>
    <script src="https://ghostfromin.github.io/rsrtc_l9ine/script.main.js"></script>
</body>

</html>
